<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:230px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.sidebar h2{
  margin-bottom:25px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  font-weight:bold;
}

.sidebar button:hover{
  background:#334155;
}

.main{
  margin-left:250px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  margin-bottom:20px;
  border:1px solid #334155;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.addBtn{
  background:#38bdf8;
  color:black;
}

.approveBtn{
  background:#22c55e;
  color:white;
}

.rejectBtn{
  background:#ef4444;
  color:white;
}

.item{
  background:#0f172a;
  padding:15px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #334155;
}

.status{
  color:#38bdf8;
  font-weight:bold;
}

@media(max-width:768px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }

  .main{
    margin-left:0;
  }
}

</style>

</head>

<body>

<div class="sidebar">
  <h2>Admin Panel</h2>

  <button onclick="showPage('inventoryPage')">Inventory</button>
  <button onclick="showPage('requestsPage')">Requests</button>
  <button onclick="showPage('historyPage')">History</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <section id="inventoryPage">
    <div class="card">
      <h1>Add Bible Tract</h1>

      <input id="title" placeholder="Tract Title">
      <input id="category" placeholder="Category / Language">
      <textarea id="description" placeholder="Description"></textarea>
      <input id="stock" type="number" placeholder="Stock Quantity">

      <button class="addBtn" onclick="addTract()">Add Tract</button>
    </div>

    <div class="card">
      <h2>Inventory</h2>
      <div id="inventoryList">Loading...</div>
    </div>
  </section>

  <section id="requestsPage" style="display:none;">
    <div class="card">
      <h2>Customer Requests</h2>
      <div id="requestList">Loading...</div>
    </div>
  </section>

  <section id="historyPage" style="display:none;">
    <div class="card">
      <h2>Checkout / Inventory History</h2>
      <div id="historyList">Loading history...</div>
    </div>
  </section>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  getDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB81uzFSKlYlkA6aYNJ0PHjUlkdUnV9DL4",
  authDomain: "bible-tracts-system.firebaseapp.com",
  projectId: "bible-tracts-system",
  storageBucket: "bible-tracts-system.firebasestorage.app",
  messagingSenderId: "456563945818",
  appId: "1:456563945818:web:c17c4f45b46f4adb628363",
  measurementId: "G-T2HX6YYWWK"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ADMIN PROTECTION */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));

  if (!snap.exists() || snap.data().role !== "admin") {
    alert("Admin access only.");
    window.location.href = "request-tracts.html";
    return;
  }
});

/* PAGE SWITCH */
window.showPage = (page) => {
  document.getElementById("inventoryPage").style.display = "none";
  document.getElementById("requestsPage").style.display = "none";
  document.getElementById("historyPage").style.display = "none";

  document.getElementById(page).style.display = "block";
};

/* ADD TRACT */
window.addTract = async () => {
  const title = document.getElementById("title").value.trim();
  const category = document.getElementById("category").value.trim();
  const description = document.getElementById("description").value.trim();
  const stock = Number(document.getElementById("stock").value);

  if (!title || !category || !description || stock <= 0) {
    alert("Please complete all fields correctly.");
    return;
  }

  await addDoc(collection(db, "tracts"), {
    title,
    category,
    description,
    stock,
    createdAt: serverTimestamp()
  });

  await addDoc(collection(db, "history"), {
    action: "Added Tract",
    tractTitle: title,
    quantity: stock,
    date: serverTimestamp()
  });

  document.getElementById("title").value = "";
  document.getElementById("category").value = "";
  document.getElementById("description").value = "";
  document.getElementById("stock").value = "";

  alert("Tract added.");
};

/* LIVE INVENTORY */
onSnapshot(collection(db, "tracts"), (snapshot) => {
  const inventoryList = document.getElementById("inventoryList");
  inventoryList.innerHTML = "";

  if (snapshot.empty) {
    inventoryList.innerHTML = "<p>No tracts yet.</p>";
    return;
  }

  snapshot.forEach((docItem) => {
    const tract = docItem.data();
    const id = docItem.id;

    inventoryList.innerHTML += `
      <div class="item">
        <h3>${tract.title}</h3>
        <p>${tract.description}</p>
        <p><strong>Category:</strong> ${tract.category}</p>
        <p class="status">Stock: ${tract.stock}</p>

        <input id="stock-${id}" type="number" placeholder="New stock amount">

        <button class="addBtn" onclick="updateStock('${id}', '${String(tract.title).replace(/'/g, "\\'")}')">
          Update Stock
        </button>

        <button class="rejectBtn" onclick="deleteTract('${id}', '${String(tract.title).replace(/'/g, "\\'")}')">
          Delete Tract
        </button>
      </div>
    `;
  });
});

/* UPDATE STOCK */
window.updateStock = async (tractId, tractTitle) => {
  const input = document.getElementById(`stock-${tractId}`);
  const newStock = Number(input.value);

  if (input.value === "" || newStock < 0) {
    alert("Enter valid stock.");
    return;
  }

  const tractRef = doc(db, "tracts", tractId);
  const tractSnap = await getDoc(tractRef);

  if (!tractSnap.exists()) {
    alert("Tract not found.");
    return;
  }

  const oldStock = tractSnap.data().stock;

  await updateDoc(tractRef, {
    stock: newStock
  });

  await addDoc(collection(db, "history"), {
    action: "Updated Stock",
    tractId,
    tractTitle,
    oldStock,
    newStock,
    date: serverTimestamp()
  });

  input.value = "";
  alert("Stock updated.");
};

/* DELETE TRACT */
window.deleteTract = async (tractId, tractTitle) => {
  const confirmDelete = confirm(`Delete ${tractTitle}?`);
  if (!confirmDelete) return;

  const tractRef = doc(db, "tracts", tractId);
  const tractSnap = await getDoc(tractRef);

  let stockBeforeDelete = 0;

  if (tractSnap.exists()) {
    stockBeforeDelete = tractSnap.data().stock || 0;
  }

  await addDoc(collection(db, "history"), {
    action: "Deleted Tract",
    tractId,
    tractTitle,
    stockBeforeDelete,
    date: serverTimestamp()
  });

  await deleteDoc(doc(db, "tracts", tractId));

  alert("Tract deleted.");
};

/* LIVE REQUESTS */
onSnapshot(collection(db, "requests"), (snapshot) => {
  const requestList = document.getElementById("requestList");
  requestList.innerHTML = "";

  if (snapshot.empty) {
    requestList.innerHTML = "<p>No customer requests yet.</p>";
    return;
  }

  snapshot.forEach((docItem) => {
    const request = docItem.data();
    const id = docItem.id;

    const date = request.createdAt?.toDate
      ? request.createdAt.toDate().toLocaleString()
      : "No date";

    requestList.innerHTML += `
      <div class="item">
        <h3>${request.customerName}</h3>
        <p><strong>Ticket ID:</strong> ${id}</p>
        <p><strong>Contact:</strong> ${request.contact}</p>
        <p><strong>Address:</strong> ${request.address || "N/A"}</p>
        <p><strong>Tract:</strong> ${request.tractTitle}</p>
        <p><strong>Quantity:</strong> ${request.quantity}</p>
        <p><strong>Date Requested:</strong> ${date}</p>
        <p>Status: <span class="status">${request.status}</span></p>

        ${
          request.status === "Pending"
          ? `
            <button class="approveBtn" onclick="approveRequest('${id}', '${request.tractId}', ${request.quantity})">
              Approve / Checkout
            </button>

            <button class="rejectBtn" onclick="rejectRequest('${id}')">
              Reject
            </button>
          `
          : ""
        }
      </div>
    `;
  });
});

/* APPROVE REQUEST */
window.approveRequest = async (requestId, tractId, quantity) => {
  const tractRef = doc(db, "tracts", tractId);
  const tractSnap = await getDoc(tractRef);

  if (!tractSnap.exists()) {
    alert("Tract not found.");
    return;
  }

  const tract = tractSnap.data();

  if (quantity > tract.stock) {
    alert("Not enough stock.");
    return;
  }

  await updateDoc(tractRef, {
    stock: tract.stock - quantity
  });

  await updateDoc(doc(db, "requests", requestId), {
    status: "Approved",
    approvedAt: serverTimestamp()
  });

  await addDoc(collection(db, "history"), {
    action: "Approved Request / Checkout",
    requestId,
    tractId,
    tractTitle: tract.title,
    quantity,
    stockBefore: tract.stock,
    stockAfter: tract.stock - quantity,
    date: serverTimestamp()
  });

  alert("Request approved and stock updated.");
};

/* REJECT REQUEST */
window.rejectRequest = async (requestId) => {
  await updateDoc(doc(db, "requests", requestId), {
    status: "Rejected",
    rejectedAt: serverTimestamp()
  });

  await addDoc(collection(db, "history"), {
    action: "Rejected Request",
    requestId,
    date: serverTimestamp()
  });

  alert("Request rejected.");
};

/* LIVE HISTORY */
onSnapshot(collection(db, "history"), (snapshot) => {
  const historyList = document.getElementById("historyList");
  historyList.innerHTML = "";

  if (snapshot.empty) {
    historyList.innerHTML = "<p>No history yet.</p>";
    return;
  }

  snapshot.forEach((docItem) => {
    const h = docItem.data();

    const date = h.date?.toDate
      ? h.date.toDate().toLocaleString()
      : "No date";

    historyList.innerHTML += `
      <div class="item">
        <p><strong>Action:</strong> ${h.action || ""}</p>
        <p><strong>Tract:</strong> ${h.tractTitle || "N/A"}</p>
        <p><strong>Quantity:</strong> ${h.quantity || "N/A"}</p>
        <p><strong>Old Stock:</strong> ${h.oldStock ?? h.stockBefore ?? "N/A"}</p>
        <p><strong>New Stock:</strong> ${h.newStock ?? h.stockAfter ?? "N/A"}</p>
        <p><strong>Date:</strong> ${date}</p>
        

        <button class="rejectBtn" onclick="deleteHistory('${docItem.id}')">
  Delete History
</button>
      </div>
    `;
  });
});
window.deleteHistory = async (historyId) => {
  const confirmDelete = confirm("Delete this history permanently?");
  if (!confirmDelete) return;

  try {
    await deleteDoc(doc(db, "history", historyId));

    alert("History deleted permanently.");

  } catch (error) {
    console.error(error);
    alert("Delete failed.");
  }
};
/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
